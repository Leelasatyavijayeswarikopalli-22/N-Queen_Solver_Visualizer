<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N Queens Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1 id="title">N-Queens Solver & Visualizer</h1>

    <div class="controls">
        <input type="number" id="nValue" min="4" max="12" value="8" oninput="updateBoard()">
        <button onclick="start()">Solve</button>
    </div>

    <div id="board" class="board"></div>
</div>

<script src="script.js"></script>
</body>
</html>
